H-tar-to","pronFormal":"EE-ne ok-TO pa-RA TEH-tar-to","note":"Literally: eight minus a quarter."},{"type":"phrase","category":"Time & Scheduling","english":"It is quarter past five.","casual":"Είναι πέντε και τέταρτο.","formal":"Είναι πέντε και τέταρτο.","pronCasual":"EE-ne PEN-de ke TEH-tar-to","pronFormal":"EE-ne PEN-de ke TEH-tar-to","note":"Literally: five and a quarter."},{"type":"phrase","category":"Time & Scheduling","english":"What time is it?","casual":"Τι ώρα είναι;","formal":"Τι ώρα είναι;","pronCasual":"tee O-ra EE-ne","pronFormal":"tee O-ra EE-ne","note":"Basic time question."},{"type":"phrase","category":"Time & Scheduling","english":"What time should I be ready?","casual":"Τι ώρα να είμαι έτοιμη;","formal":"Τι ώρα να είμαι έτοιμη;","pronCasual":"tee O-ra na EE-me EH-tee-mee","pronFormal":"tee O-ra na EE-me EH-tee-mee","note":"Female form: έτοιμη."},{"type":"phrase","category":"Time & Scheduling","english":"What time does it start?","casual":"Τι ώρα αρχίζει;","formal":"Τι ώρα αρχίζει;","pronCasual":"tee O-ra ar-HEE-zee","pronFormal":"tee O-ra ar-HEE-zee","note":"Useful for events, dinners, tours."},{"type":"phrase","category":"Time & Scheduling","english":"What time are we meeting?","casual":"Τι ώρα θα βρεθούμε;","formal":"Τι ώρα θα βρεθούμε;","pronCasual":"tee O-ra tha vre-THOO-me","pronFormal":"tee O-ra tha vre-THOO-me","note":"Natural for meeting up."},{"type":"phrase","category":"Time & Scheduling","english":"Can we meet at six?","casual":"Μπορούμε να βρεθούμε στις έξι;","formal":"Μπορούμε να βρεθούμε στις έξι;","pronCasual":"bo-ROO-me na vre-THOO-me stis EK-see","pronFormal":"bo-ROO-me na vre-THOO-me stis EK-see","note":"Use στις before clock time."},{"type":"phrase","category":"Time & Scheduling","english":"Let’s meet at seven thirty.","casual":"Να βρεθούμε στις εφτάμιση.","formal":"Να βρεθούμε στις εφτάμιση.","pronCasual":"na vre-THOO-me stis ef-TA-mee-see","pronFormal":"na vre-THOO-me stis ef-TA-mee-see","note":"Friendly suggestion."},{"type":"phrase","category":"Time & Scheduling","english":"I will be there at eight.","casual":"Θα είμαι εκεί στις οκτώ.","formal":"Θα είμαι εκεί στις οκτώ.","pronCasual":"tha EE-me e-KEE stis ok-TO","pronFormal":"tha EE-me e-KEE stis ok-TO","note":"Female speaker form does not change here."},{"type":"phrase","category":"Time & Scheduling","english":"I will be a little late.","casual":"Θα αργήσω λίγο.","formal":"Θα αργήσω λίγο.","pronCasual":"tha ar-GHEE-so LEE-gho","pronFormal":"tha ar-GHEE-so LEE-gho","note":"Natural apology before arriving late."},{"type":"phrase","category":"Time & Scheduling","english":"Sorry, I am late.","casual":"Συγγνώμη, άργησα.","formal":"Συγγνώμη, άργησα.","pronCasual":"see-GHNO-mee AR-ghee-sa","pronFormal":"see-GHNO-mee AR-ghee-sa","note":"Female/male same for this past form."},{"type":"phrase","category":"Time & Scheduling","english":"I am coming now.","casual":"Έρχομαι τώρα.","formal":"Έρχομαι τώρα.","pronCasual":"ER-ho-me TO-ra","pronFormal":"ER-ho-me TO-ra","note":"Useful by text or phone."},{"type":"phrase","category":"Time & Scheduling","english":"I will be ready in ten minutes.","casual":"Θα είμαι έτοιμη σε δέκα λεπτά.","formal":"Θα είμαι έτοιμη σε δέκα λεπτά.","pronCasual":"tha EE-me EH-tee-mee se THEH-ka lep-TA","pronFormal":"tha EE-me EH-tee-mee se THEH-ka lep-TA","note":"Female form: έτοιμη."},{"type":"phrase","category":"Time & Scheduling","english":"Is tomorrow morning okay?","casual":"Είναι εντάξει αύριο το πρωί;","formal":"Είναι εντάξει αύριο το πρωί;","pronCasual":"EE-ne en-DAK-see AV-ree-o to pro-EE","pronFormal":"EE-ne en-DAK-see AV-ree-o to pro-EE","note":"For confirming a plan."},{"type":"phrase","category":"Time & Scheduling","english":"Tomorrow afternoon is good for me.","casual":"Αύριο το απόγευμα είναι καλά για μένα.","formal":"Αύριο το απόγευμα είναι καλά για μένα.","pronCasual":"AV-ree-o to a-PO-yev-ma EE-ne ka-LA ya MEH-na","pronFormal":"AV-ree-o to a-PO-yev-ma EE-ne ka-LA ya MEH-na","note":"Natural scheduling answer."},{"type":"phrase","category":"Time & Scheduling","english":"Let’s go tomorrow evening.","casual":"Να πάμε αύριο το βράδυ.","formal":"Να πάμε αύριο το βράδυ.","pronCasual":"na PA-me AV-ree-o to VRA-thee","pronFormal":"na PA-me AV-ree-o to VRA-thee","note":"Suggestion, not a command."},{"type":"phrase","category":"Time & Scheduling","english":"Can we confirm the plan?","casual":"Μπορούμε να επιβεβαιώσουμε το πρόγραμμα;","formal":"Μπορούμε να επιβεβαιώσουμε το πρόγραμμα;","pronCasual":"bo-ROO-me na e-pee-ve-ve-O-soo-me to PRO-ghra-ma","pronFormal":"bo-ROO-me na e-pee-ve-ve-O-soo-me to PRO-ghra-ma","note":"A little more formal but useful."},{"type":"phrase","category":"Time & Scheduling","english":"See you tomorrow morning.","casual":"Τα λέμε αύριο το πρωί.","formal":"Θα τα πούμε αύριο το πρωί.","pronCasual":"ta LEH-me AV-ree-o to pro-EE","pronFormal":"tha ta POO-me AV-ree-o to pro-EE","note":"Casual is warmer; formal is safer with older people."},{"type":"phrase","category":"Social Warmth","english":"This food is delicious.","casual":"Είναι πολύ νόστιμο.","formal":"Είναι πολύ νόστιμο.","pronCasual":"EE-ne po-LEE NO-stee-mo","pronFormal":"EE-ne po-LEE NO-stee-mo","note":"Works for a dish or food in general."},{"type":"phrase","category":"Social Warmth","english":"Your cooking is wonderful.","casual":"Μαγειρεύεις υπέροχα.","formal":"Μαγειρεύετε υπέροχα.","pronCasual":"ma-yee-REV-ees ee-PEH-ro-ha","pronFormal":"ma-yee-REV-e-te ee-PEH-ro-ha","note":"Use formal with older relatives/hosts."},{"type":"phrase","category":"Social Warmth","english":"Thank you for taking care of me.","casual":"Ευχαριστώ που με φροντίζεις.","formal":"Σας ευχαριστώ που με φροντίζετε.","pronCasual":"ef-ha-ree-STO poo me fron-TEE-zees","pronFormal":"sas ef-ha-ree-STO poo me fron-TEE-ze-te","note":"Warm and personal."},{"type":"phrase","category":"Social Warmth","english":"Thank you for welcoming me.","casual":"Ευχαριστώ που με καλωσόρισες.","formal":"Σας ευχαριστώ που με καλωσορίσατε.","pronCasual":"ef-ha-ree-STO poo me ka-lo-SO-ree-ses","pronFormal":"sas ef-ha-ree-STO poo me ka-lo-so-REE-sa-te","note":"Good after arriving at a family home."},{"type":"phrase","category":"Social Warmth","english":"You made me feel at home.","casual":"Με έκανες να νιώσω σαν στο σπίτι μου.","formal":"Με κάνατε να νιώσω σαν στο σπίτι μου.","pronCasual":"me EH-ka-nes na NYO-so san sto SPEE-tee moo","pronFormal":"me KA-na-te na NYO-so san sto SPEE-tee moo","note":"Host-family gratitude."},{"type":"phrase","category":"Social Warmth","english":"How was your day?","casual":"Πώς ήταν η μέρα σου;","formal":"Πώς ήταν η μέρα σας;","pronCasual":"pos EE-tan ee MEH-ra soo","pronFormal":"pos EE-tan ee MEH-ra sas","note":"Warm daily question."},{"type":"phrase","category":"Social Warmth","english":"Did you have a good day?","casual":"Είχες καλή μέρα;","formal":"Είχατε καλή μέρα;","pronCasual":"EE-hes ka-LEE MEH-ra","pronFormal":"EE-ha-te ka-LEE MEH-ra","note":"Friendly check-in."},{"type":"phrase","category":"Social Warmth","english":"I am happy to be here.","casual":"Χαίρομαι που είμαι εδώ.","formal":"Χαίρομαι που είμαι εδώ.","pronCasual":"HEH-ro-me poo EE-me e-THO","pronFormal":"HEH-ro-me poo EE-me e-THO","note":"Simple and heartfelt."},{"type":"phrase","category":"Social Warmth","english":"I am happy to be part of the family.","casual":"Χαίρομαι που είμαι μέρος της οικογένειας.","formal":"Χαίρομαι που είμαι μέρος της οικογένειας.","pronCasual":"HEH-ro-me poo EE-me MEH-ros tees ee-ko-YEH-nee-as","pronFormal":"HEH-ro-me poo EE-me MEH-ros tees ee-ko-YEH-nee-as","note":"Warm but not overly dramatic."},{"type":"phrase","category":"Social Warmth","english":"I appreciate this very much.","casual":"Το εκτιμώ πολύ.","formal":"Το εκτιμώ πολύ.","pronCasual":"to ek-tee-MO po-LEE","pronFormal":"to ek-tee-MO po-LEE","note":"Useful for gratitude beyond ευχαριστώ."},{"type":"phrase","category":"Social Warmth","english":"This means a lot to me.","casual":"Αυτό σημαίνει πολλά για μένα.","formal":"Αυτό σημαίνει πολλά για μένα.","pronCasual":"af-TO see-MEH-nee po-LA ya MEH-na","pronFormal":"af-TO see-MEH-nee po-LA ya MEH-na","note":"Emotional but natural."},{"type":"phrase","category":"Social Warmth","english":"You are very kind.","casual":"Είσαι πολύ καλός.","formal":"Είστε πολύ καλός.","pronCasual":"EE-se po-LEE ka-LOS","pronFormal":"EE-ste po-LEE ka-LOS","note":"To a man; use καλή for a woman."},{"type":"phrase","category":"Social Warmth","english":"She is very kind.","casual":"Είναι πολύ καλή.","formal":"Είναι πολύ καλή.","pronCasual":"EE-ne po-LEE ka-LEE","pronFormal":"EE-ne po-LEE ka-LEE","note":"Useful when complimenting a woman."},{"type":"phrase","category":"Social Warmth","english":"Everything is beautiful.","casual":"Όλα είναι όμορφα.","formal":"Όλα είναι όμορφα.","pronCasual":"O-la EE-ne O-mor-fa","pronFormal":"O-la EE-ne O-mor-fa","note":"For home, table, view, preparations."},{"type":"phrase","category":"Social Warmth","english":"The table is beautiful.","casual":"Το τραπέζι είναι πολύ όμορφο.","formal":"Το τραπέζι είναι πολύ όμορφο.","pronCasual":"to tra-PEH-zee EE-ne po-LEE O-mor-fo","pronFormal":"to tra-PEH-zee EE-ne po-LEE O-mor-fo","note":"Compliment for a Greek table."},{"type":"phrase","category":"Social Warmth","english":"Cheers to our health.","casual":"Στην υγειά μας.","formal":"Στην υγειά μας.","pronCasual":"steen ee-YA mas","pronFormal":"steen ee-YA mas","note":"Classic toast: to our health."},{"type":"phrase","category":"Social Warmth","english":"Cheers to love and family.","casual":"Στην αγάπη και στην οικογένεια.","formal":"Στην αγάπη και στην οικογένεια.","pronCasual":"steen a-GHA-pee ke steen ee-ko-YEH-nee-a","pronFormal":"steen a-GHA-pee ke steen ee-ko-YEH-nee-a","note":"Warm table toast."},{"type":"phrase","category":"Social Warmth","english":"To beautiful moments.","casual":"Στις όμορφες στιγμές.","formal":"Στις όμορφες στιγμές.","pronCasual":"stees O-mor-fes stee-GHmes","pronFormal":"stees O-mor-fes stee-GHmes","note":"Short poetic toast."},{"type":"phrase","category":"Social Warmth","english":"May we always be well.","casual":"Να είμαστε πάντα καλά.","formal":"Να είμαστε πάντα καλά.","pronCasual":"na EE-ma-ste PAN-da ka-LA","pronFormal":"na EE-ma-ste PAN-da ka-LA","note":"Very Greek-feeling warm wish."},{"type":"phrase","category":"Social Warmth","english":"I am full, thank you.","casual":"Έχω χορτάσει, ευχαριστώ.","formal":"Έχω χορτάσει, σας ευχαριστώ.","pronCasual":"EH-ho hor-TA-see ef-ha-ree-STO","pronFormal":"EH-ho hor-TA-see sas ef-ha-ree-STO","note":"Warm way to decline more food."},{"type":"phrase","category":"Social Warmth","english":"It was delicious, but I cannot eat more.","casual":"Ήταν νόστιμο, αλλά δεν μπορώ άλλο.","formal":"Ήταν νόστιμο, αλλά δεν μπορώ άλλο.","pronCasual":"EE-tan NO-stee-mo a-LA then bo-RO A-lo","pronFormal":"EE-tan NO-stee-mo a-LA then bo-RO A-lo","note":"Declines food while complimenting it."},{"type":"phrase","category":"Social Warmth","english":"Maybe a little later.","casual":"Ίσως λίγο αργότερα.","formal":"Ίσως λίγο αργότερα.","pronCasual":"EE-sos LEE-gho ar-GHO-te-ra","pronFormal":"EE-sos LEE-gho ar-GHO-te-ra","note":"Soft decline."},{"type":"phrase","category":"Social Warmth","english":"Thank you, but I am really full.","casual":"Ευχαριστώ, αλλά είμαι πραγματικά χορτάτη.","formal":"Σας ευχαριστώ, αλλά είμαι πραγματικά χορτάτη.","pronCasual":"ef-ha-ree-STO a-LA EE-me prag-ma-tee-KA hor-TA-tee","pronFormal":"sas ef-ha-ree-STO a-LA EE-me prag-ma-tee-KA hor-TA-tee","note":"Female form: χορτάτη."},{"type":"phrase","category":"Social Warmth","english":"I loved this dish.","casual":"Μου άρεσε πολύ αυτό το φαγητό.","formal":"Μου άρεσε πολύ αυτό το φαγητό.","pronCasual":"moo A-re-se po-LEE af-TO to fa-yee-TO","pronFormal":"moo A-re-se po-LEE af-TO to fa-yee-TO","note":"Useful after a meal."},{"type":"phrase","category":"Social Warmth","english":"You made this day special.","casual":"Έκανες αυτή τη μέρα ξεχωριστή.","formal":"Κάνατε αυτή τη μέρα ξεχωριστή.","pronCasual":"EH-ka-nes af-TEE tee MEH-ra kse-ho-ree-STEE","pronFormal":"KA-na-te af-TEE tee MEH-ra kse-ho-ree-STEE","note":"Heartfelt gratitude."},{"type":"phrase","category":"Family & Belonging","english":"I am very happy to meet you.","casual":"Χαίρομαι πολύ που σε γνωρίζω.","formal":"Χαίρομαι πολύ που σας γνωρίζω.","pronCasual":"HEH-ro-me po-LEE poo se ghno-REE-zo","pronFormal":"HEH-ro-me po-LEE poo sas ghno-REE-zo","note":"Use formal for parents/older relatives."},{"type":"phrase","category":"Family & Belonging","english":"Thank you for having me here.","casual":"Ευχαριστώ που με έχετε εδώ.","formal":"Σας ευχαριστώ που με έχετε εδώ.","pronCasual":"ef-ha-ree-STO poo me EH-he-te e-THO","pronFormal":"sas ef-ha-ree-STO poo me EH-he-te e-THO","note":"Warm guest phrase."},{"type":"phrase","category":"Family & Belonging","english":"I am still learning Greek.","casual":"Ακόμα μαθαίνω ελληνικά.","formal":"Ακόμα μαθαίνω ελληνικά.","pronCasual":"a-KO-ma ma-THEH-no e-lee-nee-KA","pronFormal":"a-KO-ma ma-THEH-no e-lee-nee-KA","note":"Honest and simple."},{"type":"phrase","category":"Family & Belonging","english":"Please be patient with my Greek.","casual":"Κάνε υπομονή με τα ελληνικά μου, παρακαλώ.","formal":"Κάντε υπομονή με τα ελληνικά μου, παρακαλώ.","pronCasual":"KA-ne ee-po-mo-NEE me ta e-lee-nee-KA moo pa-ra-ka-LO","pronFormal":"KAN-de ee-po-mo-NEE me ta e-lee-nee-KA moo pa-ra-ka-LO","note":"Useful with family."},{"type":"phrase","category":"Family & Belonging","english":"You speak too fast for me.","casual":"Μιλάς πολύ γρήγορα για μένα.","formal":"Μιλάτε πολύ γρήγορα για μένα.","pronCasual":"mee-LAS po-LEE GHREE-gho-ra ya MEH-na","pronFormal":"mee-LA-te po-LEE GHREE-gho-ra ya MEH-na","note":"Direct but okay if said warmly."},{"type":"phrase","category":"Family & Belonging","english":"Can you say it more slowly?","casual":"Μπορείς να το πεις πιο αργά;","formal":"Μπορείτε να το πείτε πιο αργά;","pronCasual":"bo-REES na to pees pyo ar-GHA","pronFormal":"bo-REE-te na to PEE-te pyo ar-GHA","note":"Better than only asking for repeat."},{"type":"phrase","category":"Family & Belonging","english":"Can you use simpler words?","casual":"Μπορείς να χρησιμοποιήσεις πιο απλές λέξεις;","formal":"Μπορείτε να χρησιμοποιήσετε πιο απλές λέξεις;","pronCasual":"bo-REES na hree-see-mo-pee-EE-sees pyo a-PLES LEK-sees","pronFormal":"bo-REE-te na hree-see-mo-pee-EE-se-te pyo a-PLES LEK-sees","note":"For real comprehension."},{"type":"phrase","category":"Family & Belonging","english":"Did I say that correctly?","casual":"Το είπα σωστά;","formal":"Το είπα σωστά;","pronCasual":"to EE-pa so-STA","pronFormal":"to EE-pa so-STA","note":"Female/male same."},{"type":"phrase","category":"Family & Belonging","english":"Am I doing this correctly?","casual":"Το κάνω σωστά;","formal":"Το κάνω σωστά;","pronCasual":"to KA-no so-STA","pronFormal":"to KA-no so-STA","note":"Useful at the table or in the home."},{"type":"phrase","category":"Family & Belonging","english":"Should I put this here?","casual":"Να το βάλω εδώ;","formal":"Να το βάλω εδώ;","pronCasual":"na to VA-lo e-THO","pronFormal":"na to VA-lo e-THO","note":"Natural household help phrase."},{"type":"phrase","category":"Family & Belonging","english":"Should I take my shoes off?","casual":"Να βγάλω τα παπούτσια μου;","formal":"Να βγάλω τα παπούτσια μου;","pronCasual":"na VGHA-lo ta pa-POO-tsya moo","pronFormal":"na VGHA-lo ta pa-POO-tsya moo","note":"Useful when entering a home."},{"type":"phrase","category":"Family & Belonging","english":"Where should I sit?","casual":"Πού να καθίσω;","formal":"Πού να καθίσω;","pronCasual":"poo na ka-THEE-so","pronFormal":"poo na ka-THEE-so","note":"At table or gathering."},{"type":"phrase","category":"Family & Belonging","english":"I love your family traditions.","casual":"Αγαπώ τις παραδόσεις της οικογένειάς σας.","formal":"Αγαπώ τις παραδόσεις της οικογένειάς σας.","pronCasual":"a-gha-PO tees pa-ra-THO-sees tees ee-ko-yeh-NEE-as sas","pronFormal":"a-gha-PO tees pa-ra-THO-sees tees ee-ko-yeh-NEE-as sas","note":"Formal plural fits family context."},{"type":"phrase","category":"Family & Belonging","english":"This custom is beautiful.","casual":"Αυτό το έθιμο είναι όμορφο.","formal":"Αυτό το έθιμο είναι όμορφο.","pronCasual":"af-TO to EH-thee-mo EE-ne O-mor-fo","pronFormal":"af-TO to EH-thee-mo EE-ne O-mor-fo","note":"Custom = έθιμο."},{"type":"phrase","category":"Family & Belonging","english":"What does this custom mean?","casual":"Τι σημαίνει αυτό το έθιμο;","formal":"Τι σημαίνει αυτό το έθιμο;","pronCasual":"tee see-MEH-nee af-TO to EH-thee-mo","pronFormal":"tee see-MEH-nee af-TO to EH-thee-mo","note":"Respectful curiosity."},{"type":"phrase","category":"Family & Belonging","english":"Can you explain this tradition to me?","casual":"Μπορείς να μου εξηγήσεις αυτή την παράδοση;","formal":"Μπορείτε να μου εξηγήσετε αυτή την παράδοση;","pronCasual":"bo-REES na moo ek-see-GHEE-sees af-TEE teen pa-RA-tho-see","pronFormal":"bo-REE-te na moo ek-see-GHEE-se-te af-TEE teen pa-RA-tho-see","note":"Polite with relatives."},{"type":"phrase","category":"Family & Belonging","english":"I want to understand, not just translate.","casual":"Θέλω να καταλάβω, όχι μόνο να μεταφράσω.","formal":"Θέλω να καταλάβω, όχι μόνο να μεταφράσω.","pronCasual":"THEH-lo na ka-ta-LA-vo OH-hee MO-no na me-ta-FRA-so","pronFormal":"THEH-lo na ka-ta-LA-vo OH-hee MO-no na me-ta-FRA-so","note":"Good learner mindset phrase."},{"type":"phrase","category":"Family & Belonging","english":"It is important to me to respect your family.","casual":"Είναι σημαντικό για μένα να σέβομαι την οικογένειά σας.","formal":"Είναι σημαντικό για μένα να σέβομαι την οικογένειά σας.","pronCasual":"EE-ne see-man-dee-KO ya MEH-na na SEH-vo-me teen ee-ko-yeh-NEE-a sas","pronFormal":"EE-ne see-man-dee-KO ya MEH-na na SEH-vo-me teen ee-ko-yeh-NEE-a sas","note":"Formal plural is natural here."},{"type":"phrase","category":"Family & Belonging","english":"Thank you for making space for me.","casual":"Ευχαριστώ που μου κάνετε χώρο.","formal":"Σας ευχαριστώ που μου κάνετε χώρο.","pronCasual":"ef-ha-ree-STO poo moo KA-ne-te HO-ro","pronFormal":"sas ef-ha-ree-STO poo moo KA-ne-te HO-ro","note":"Means emotional/social space, not only physical room."},{"type":"phrase","category":"Family & Belonging","english":"I feel welcome here.","casual":"Νιώθω καλοδεχούμενη εδώ.","formal":"Νιώθω καλοδεχούμενη εδώ.","pronCasual":"NYO-tho ka-lo-the-HOO-me-nee e-THO","pronFormal":"NYO-tho ka-lo-the-HOO-me-nee e-THO","note":"Female form: καλοδεχούμενη."},{"type":"phrase","category":"Partner & Intimacy","english":"My love.","casual":"Αγάπη μου.","formal":"Αγάπη μου.","pronCasual":"a-GHA-pee moo","pronFormal":"a-GHA-pee moo","note":"Endearment; intimate, not for formal use."},{"type":"phrase","category":"Partner & Intimacy","english":"My sweet one.","casual":"Γλυκό μου.","formal":"Γλυκό μου.","pronCasual":"ghlee-KO moo","pronFormal":"ghlee-KO moo","note":"Tender, playful endearment."},{"type":"phrase","category":"Partner & Intimacy","english":"My soul.","casual":"Ψυχή μου.","formal":"Ψυχή μου.","pronCasual":"psee-HEE moo","pronFormal":"psee-HEE moo","note":"Very affectionate and poetic."},{"type":"phrase","category":"Partner & Intimacy","english":"I am proud of you.","casual":"Είμαι περήφανη για σένα.","formal":"Είμαι περήφανη για εσάς.","pronCasual":"EE-me pe-REE-fa-nee ya SEH-na","pronFormal":"EE-me pe-REE-fa-nee ya e-SAS","note":"Female form: περήφανη."},{"type":"phrase","category":"Partner & Intimacy","english":"I missed you.","casual":"Μου έλειψες.","formal":"Μου λείψατε.","pronCasual":"moo EH-leep-ses","pronFormal":"moo LEEP-sa-te","note":"Casual is for partner; formal is included for pattern consistency."},{"type":"phrase","category":"Partner & Intimacy","english":"You make me happy.","casual":"Με κάνεις χαρούμενη.","formal":"Με κάνετε χαρούμενη.","pronCasual":"me KA-nees ha-ROO-me-nee","pronFormal":"me KA-ne-te ha-ROO-me-nee","note":"Female form: χαρούμενη."},{"type":"phrase","category":"Partner & Intimacy","english":"Good morning, my love.","casual":"Καλημέρα, αγάπη μου.","formal":"Καλημέρα σας.","pronCasual":"ka-lee-MEH-ra a-GHA-pee moo","pronFormal":"ka-lee-MEH-ra sas","note":"Formal is not intimate; use casual with partner."},{"type":"phrase","category":"Partner & Intimacy","english":"Good night, my sweet one.","casual":"Καληνύχτα, γλυκό μου.","formal":"Καληνύχτα σας.","pronCasual":"ka-lee-NEEH-ta ghlee-KO moo","pronFormal":"ka-lee-NEEH-ta sas","note":"Casual is the real partner phrase."},{"type":"phrase","category":"Partner & Intimacy","english":"I love you.","casual":"Σ’ αγαπώ.","formal":"Σας αγαπώ.","pronCasual":"sa-gha-PO","pronFormal":"sas a-gha-PO","note":"Casual for partner; formal only in special respectful contexts."},{"type":"phrase","category":"Partner & Intimacy","english":"I love you very much.","casual":"Σ’ αγαπώ πολύ.","formal":"Σας αγαπώ πολύ.","pronCasual":"sa-gha-PO po-LEE","pronFormal":"sas a-gha-PO po-LEE","note":"Warm everyday version."},{"type":"phrase","category":"Partner & Intimacy","english":"You are teasing me.","casual":"Με πειράζεις.","formal":"Με πειράζετε.","pronCasual":"me pee-RA-zees","pronFormal":"me pee-RA-ze-te","note":"Playful couple language."},{"type":"phrase","category":"Partner & Intimacy","english":"You are impossible, but I love you.","casual":"Είσαι αδύνατος, αλλά σ’ αγαπώ.","formal":"Είστε αδύνατος, αλλά σας αγαπώ.","pronCasual":"EE-se a-THEE-na-tos a-LA sa-gha-PO","pronFormal":"EE-ste a-THEE-na-tos a-LA sas a-gha-PO","note":"Playful to a man; use αδύνατη to a woman."}],"vocab":[{"type":"vocab","category":"Food Basics","english":"food","greek":"φαγητό","pron":"fa-yee-TO","clue":"Picture saying **fa-yee-TO** right before you eat. The ending **-TO** is your “food” trigger."},{"type":"vocab","category":"Food Basics","english":"breakfast","greek":"πρωινό","pron":"pro-ee-NO","clue":"**pro-ee-NO** starts the day. Think “pro morning” = breakfast."},{"type":"vocab","category":"Food Basics","english":"lunch","greek":"μεσημεριανό","pron":"me-see-me-ree-a-NO","clue":"Chunk it: **me-see-me-ree-a-NO**. It is the middle meal; the long “me-see” sound helps you remember lunch."},{"type":"vocab","category":"Food Basics","english":"dinner","greek":"βραδινό","pron":"vra-thee-NO","clue":"**vra-thee-NO** has a dark evening sound. Think “bravo, dinner is at night.”"},{"type":"vocab","category":"Food Basics","english":"bread","greek":"ψωμί","pron":"pso-MEE","clue":"“Bread? That is **so me**.” **pso-MEE** = bread."},{"type":"vocab","category":"Food Basics","english":"rice","greek":"ρύζι","pron":"REE-zee","clue":"**REE-zee** sounds like rice/risotto. Rice = **REE-zee**."},{"type":"vocab","category":"Food Basics","english":"pasta","greek":"μακαρόνια","pron":"ma-ka-RO-nya","clue":"**ma-ka-RO-nya** sounds like macaroni. Pasta = makarónia."},{"type":"vocab","category":"Food Basics","english":"potatoes","greek":"πατάτες","pron":"pa-TA-tes","clue":"**pa-TA-tes** almost says potatoes. Keep the **TA-tes** sound."},{"type":"vocab","category":"Food Basics","english":"egg","greek":"αυγό","pron":"av-GHO","clue":"**av-GHO**: picture an egg saying “I have to go!” = av-GHO."},{"type":"vocab","category":"Food Basics","english":"eggs","greek":"αυγά","pron":"av-GHA","clue":"**av-GHA**: same egg word as **av-GHO**, but many eggs end with **-GHA**."},{"type":"vocab","category":"Food Basics","english":"chicken","greek":"κοτόπουλο","pron":"ko-TO-poo-lo","clue":"**ko-TO-poo-lo**: hear “cute poultry.” Chicken = koto-poulo."},{"type":"vocab","category":"Food Basics","english":"pork","greek":"χοιρινό","pron":"hee-ree-NO","clue":"**hee-ree-NO**: think “here, piggy” for pork. Keep **hee-ree**."},{"type":"vocab","category":"Food Basics","english":"beef","greek":"μοσχάρι","pron":"mos-HA-ree","clue":"**mos-HA-ree**: imagine a cow saying “mooo” at the start. Beef = mos-HÁ-ri."},{"type":"vocab","category":"Food Basics","english":"fish","greek":"ψάρι","pron":"PSA-ree","clue":"Imagine saying “**sorry, fish**” before eating it. **PSA-ri** = fish."},{"type":"vocab","category":"Food Basics","english":"seafood","greek":"θαλασσινά","pron":"tha-la-see-NA","clue":"From **thalassa** = sea. **tha-la-see-NA** = food from the sea."},{"type":"vocab","category":"Food Basics","english":"shrimp","greek":"γαρίδες","pron":"gha-REE-thes","clue":"**gha-REE-thes**: picture shrimp in a “green reef.” Keep **REE**."},{"type":"vocab","category":"Food Basics","english":"cheese","greek":"τυρί","pron":"tee-REE","clue":"Think “teary cheese” — cheese so good it makes you teary. **tee-REE** = cheese."},{"type":"vocab","category":"Food Basics","english":"feta","greek":"φέτα","pron":"FEH-ta","clue":"**FEH-ta** is almost the same word. Easy: feta = FEH-ta."},{"type":"vocab","category":"Food Basics","english":"yogurt","greek":"γιαούρτι","pron":"ya-OOR-tee","clue":"**ya-OOR-tee** sounds like yogurt. Keep the **OOR** sound."},{"type":"vocab","category":"Food Basics","english":"milk","greek":"γάλα","pron":"GHA-la","clue":"**GHA-la**: sounds like “gala.” Imagine a glass of milk at a gala."},{"type":"vocab","category":"Food Basics","english":"butter","greek":"βούτυρο","pron":"VOO-tee-ro","clue":"**VOO-tee-ro**: picture butter going “voo!” as it slides on toast."},{"type":"vocab","category":"Food Basics","english":"oil","greek":"λάδι","pron":"LA-thee","clue":"**LA-thee**: think “lather” with oil. LA-thee = oil."},{"type":"vocab","category":"Food Basics","english":"olive oil","greek":"ελαιόλαδο","pron":"e-le-O-la-tho","clue":"**e-le-O-la-tho**: hear **O-la** like olive oil. Long word, but the **O-la** holds it."},{"type":"vocab","category":"Food Basics","english":"salt","greek":"αλάτι","pron":"a-LA-tee","clue":"**a-LA-tee**: salt on a latte would be bad; **LA-tee** = salt."},{"type":"vocab","category":"Food Basics","english":"pepper","greek":"πιπέρι","pron":"pee-PEH-ree","clue":"**pee-PEH-ree** sounds like pepper with extra “pee-pe.”"},{"type":"vocab","category":"Food Basics","english":"sugar","greek":"ζάχαρη","pron":"ZA-ha-ree","clue":"**ZA-ha-ree**: imagine sugar giving a “za!” energy hit."},{"type":"vocab","category":"Food Basics","english":"honey","greek":"μέλι","pron":"MEH-lee","clue":"**MEH-lee** sounds mellow. Honey is sweet and mellow."},{"type":"vocab","category":"Food Basics","english":"lemon","greek":"λεμόνι","pron":"le-MO-nee","clue":"**le-MO-nee** sounds close to lemon. Keep **MO-nee**."},{"type":"vocab","category":"Food Basics","english":"tomato","greek":"ντομάτα","pron":"do-MA-ta","clue":"**do-MA-ta** sounds like tomato. The middle **MA** is the anchor."},{"type":"vocab","category":"Food Basics","english":"onion","greek":"κρεμμύδι","pron":"kre-MEE-thee","clue":"**kre-MEE-thee**: imagine onion making you cry, “me, me!”"},{"type":"vocab","category":"Food Basics","english":"garlic","greek":"σκόρδο","pron":"SKOR-tho","clue":"**skor-THO**: strong garlic smell scores through the room — skor-THO."},{"type":"vocab","category":"Food Basics","english":"cucumber","greek":"αγγούρι","pron":"an-GOO-ree","clue":"**an-GOO-ree**: cucumber has a cool “goo” center."},{"type":"vocab","category":"Food Basics","english":"salad","greek":"σαλάτα","pron":"sa-LA-ta","clue":"**sa-LA-ta** sounds like salad. Easy link."},{"type":"vocab","category":"Food Basics","english":"soup","greek":"σούπα","pron":"SOO-pa","clue":"**SOO-pa** sounds like soup. Easy link."},{"type":"vocab","category":"Food Basics","english":"meat","greek":"κρέας","pron":"KREH-as","clue":"Think “carnivore **craves** meat.” **KRE-as** = meat."},{"type":"vocab","category":"Food Basics","english":"vegetables","greek":"λαχανικά","pron":"la-ha-nee-KA","clue":"**la-ha-nee-KA**: hear “leafy” in **la-ha** for vegetables."},{"type":"vocab","category":"Food Basics","english":"fruit","greek":"φρούτα","pron":"FROO-ta","clue":"**FROO-ta** sounds like fruit. Easy link."},{"type":"vocab","category":"Food Basics","english":"apple","greek":"μήλο","pron":"MEE-lo","clue":"**MEE-lo**: picture “me, low apple” on the table."},{"type":"vocab","category":"Food Ba function $(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function gr(t){return '<span lang="el">'+esc(t)+'</span>'}

const ITEMS=[...DATA.phrases.map((p,i)=>({id:'p'+i,kind:'phrase',category:p.category||'Phrases',english:p.english,greek:p.formal||p.casual||p.greek,casual:p.casual,formal:p.formal,pron:p.pronFormal||p.pronCasual||p.pron,note:p.note||''})),...DATA.vocab.map((v,i)=>({id:'v'+i,kind:'vocab',category:v.category||'Vocabulary',english:v.english,greek:v.greek,pron:v.pron,note:v.clue||''}))];

function ensureReviewState(){state.reviewMeta=state.reviewMeta||{};if(typeof state.reviewSafeOnly==='undefined')state.reviewSafeOnly=true;return state.reviewMeta}
function inferSituation(item){let txt=((item.category||'')+' '+(item.english||'')).toLowerCase();for(let k of Object.keys(SURVIVAL_CATS||{})){let meta=SURVIVAL_CATS[k];if(meta.terms.some(t=>txt.includes(t.toLowerCase())))return k}return isSurvival(item)?'General survival':'General practice'}
function inferRegister(item){if(item.casual&&item.formal&&item.casual!==item.formal)return 'formal + casual split';if(item.kind==='vocab')return 'neutral vocabulary';return 'neutral'}
function reviewFor(id){ensureReviewState();let m=state.reviewMeta[id]||{};return {confidence:m.confidence||'Needs review',notes:m.notes||'',suggested:m.suggested||'',reviewer:m.reviewer||'',updated:m.updated||0}}
function isVerified(id){return reviewFor(id).confidence==='Verified'}
function isFieldSafe(id){let c=reviewFor(id).confidence;return c==='Verified'||(!state.reviewSafeOnly&&c!=='Avoid in field')}
function confidenceClass(c){if(c==='Verified')return 'ok';if(c==='Avoid in field')return 'bad';return 'warn'}
function reviewRecord(item){let r=reviewFor(item.id);return {id:item.id,kind:item.kind,category:item.category,situation:inferSituation(item),english:item.english,greek:item.greek,greek_script:item.greek,romanization:item.pron||'',register:inferRegister(item),survival_priority:isSurvival(item)?survivalWeight(item):99,current_confidence:r.confidence,review_notes:r.notes,suggested_replacement:r.suggested,reviewer:r.reviewer,updated:r.updated}}
function csvEscape(v){v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function reviewRows(){return ITEMS.map(reviewRecord)}
function reviewCsv(){let cols=['id','kind','category','situation','english','greek','greek_script','romanization','register','survival_priority','current_confidence','review_notes','suggested_replacement','reviewer','updated'];return [cols.join(','),...reviewRows().map(r=>cols.map(c=>csvEscape(r[c])).join(','))].join('\n')}
function downloadText(filename,text,type){let blob=new Blob([text],{type:type||'text/plain'});let url=URL.createObjectURL(blob);let a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},200)}
function exportReviewJson(){downloadText('gta-v12-6-phrase-review.json',JSON.stringify({app:'GTA',version:APP_VERSION,exportedAt:new Date().toISOString(),rows:reviewRows()},null,2),'application/json');toast('Native review JSON exported.')}
function exportReviewCsv(){let csv=reviewCsv();downloadText('gta-v12-6-phrase-review.csv',csv,'text/csv');let b=$('reviewExportBox');if(b)b.value=csv.slice(0,6000);toast('Native review CSV exported.')}
function copyReviewCsv(){let csv=reviewCsv();if(navigator.clipboard){navigator.clipboard.writeText(csv).then(()=>toast('Review CSV copied.')).catch(()=>{$('reviewExportBox').value=csv})}else{$('reviewExportBox').value=csv}}
function parseReviewImport(raw){let obj=JSON.parse(raw);let rows=Array.isArray(obj)?obj:(obj.rows||[]);if(!Array.isArray(rows))throw new Error('Import must contain a rows array.');return rows}
function importReviewFile(){let raw=$('reviewImportBox')?.value||'';if(!raw.trim()){alert('Paste reviewed JSON first.');return}try{let rows=parseReviewImport(raw);ensureReviewState();let updated=0;rows.forEach(r=>{if(!r.id||!byId(r.id))return;let confidence=r.current_confidence||r.confidence||'Needs review';if(!REVIEW_CONFIDENCE.includes(confidence))confidence='Needs review';state.reviewMeta[r.id]={confidence,notes:r.review_notes||r.notes||'',suggested:r.suggested_replacement||r.suggested||'',reviewer:r.reviewer||'native review',updated:Date.now()};updated++});save();toast(updated+' review records imported.');renderMore()}catch(e){alert('Could not import review: '+(e.message||'invalid JSON'))}}
function setReviewSafeOnly(v){state.reviewSafeOnly=!!v;save();renderSurvival();toast(state.reviewSafeOnly?'Survival now prioritizes verified/safe phrases.':'Survival includes unverified phrases again.')}
function saveReview(id){ensureReviewState();let conf=$('conf_'+id)?.value||'Needs review';let notes=$('notes_'+id)?.value||'';let suggested=$('sugg_'+id)?.value||'';let reviewer=$('rev_'+id)?.value||'';state.reviewMeta[id]={confidence:conf,notes,suggested,reviewer,updated:Date.now()};save();toast('Review saved.');renderContentReview()}
function reviewSummary(){ensureReviewState();let rows=reviewRows();let verified=rows.filter(r=>r.current_confidence==='Verified').length;let avoid=rows.filter(r=>r.current_confidence==='Avoid in field').length;let needs=rows.length-verified-avoid;let survival=rows.filter(r=>r.survival_priority<99);let safeSurvival=survival.filter(r=>r.current_confidence==='Verified').length;return {total:rows.length,verified,needs,avoid,survival:survival.length,safeSurvival}}
function renderContentReview(){let host=$('contentReviewArea');if(!host)return;let q=($('reviewSearch')?.value||'').toLowerCase().trim();let filter=$('reviewFilter')?.value||'all';let arr=ITEMS.filter(it=>{let r=reviewFor(it.id);let hay=(it.id+' '+it.category+' '+it.english+' '+it.greek+' '+(it.pron||'')).toLowerCase();if(q&&!hay.includes(q))return false;if(filter==='survival'&&!isSurvival(it))return false;if(filter==='needs'&&r.confidence!=='Needs review')return false;if(filter==='verified'&&r.confidence!=='Verified')return false;if(filter==='avoid'&&r.confidence!=='Avoid in field')return false;return true}).slice(0,60);host.innerHTML=`<div class="list">${arr.map(reviewCard).join('')||'<div class="empty">No review items match.</div>'}</div>`}
function reviewCard(it){let r=reviewFor(it.id);let rec=reviewRecord(it);let opts=REVIEW_CONFIDENCE.map(c=>`<option value="${esc(c)}" ${r.confidence===c?'selected':''}>${esc(c)}</option>`).join('');return `<div class="reviewCard"><div class="row"><div><div class="sectionLabel">${esc(it.id)} · ${esc(rec.situation)} · ${esc(rec.register)}</div><h3>${esc(it.english)}</h3></div><span class="reviewBadge ${confidenceClass(r.confidence)}">${esc(r.confidence)}</span></div><div><div class="phrase">${gr(it.greek)}</div><div class="pron">${esc(it.pron||'')}</div><p class="muted tight">${esc(it.category)} · ${it.kind==='phrase'?'Phrase':'Vocabulary'} · survival priority ${rec.survival_priority}</p></div><div class="reviewForm"><select class="input" id="conf_${it.id}">${opts}</select><textarea class="input" id="notes_${it.id}" placeholder="Native speaker notes: unnatural, too formal, wrong context...">${esc(r.notes)}</textarea><textarea class="input" id="sugg_${it.id}" placeholder="Suggested replacement phrase">${esc(r.suggested)}</textarea><input class="input" id="rev_${it.id}" placeholder="Reviewer name / initials" value="${esc(r.reviewer)}"><button class="btn primary" onclick="saveReview('${it.id}')">Save review</button></div></div>`}
function contentReviewPanel(){let s=reviewSummary();return `<div class="card reviewPanel"><div class="sectionLabel">V12.7 content trust layer</div><h2>Native Review + Field-Safe Content</h2><p class="muted">This is for a fluent/native Greek reviewer. It does not erase learner progress. It only records phrase confidence, notes, and suggested corrections.</p><div class="truthGrid"><div class="truthStat"><b>${s.verified}</b><small>Verified</small></div><div class="truthStat"><b>${s.needs}</b><small>Needs review / nuanced</small></div><div class="truthStat"><b>${s.safeSurvival}/${s.survival}</b><small>Verified survival phrases</small></div><div class="truthStat"><b>${s.avoid}</b><small>Avoid in field</small></div></div><label class="safeOnly" style="margin-top:12px"><input type="checkbox" ${state.reviewSafeOnly?'checked':''} onchange="setReviewSafeOnly(this.checked)"> In “I’m here now,” prioritize field-safe phrases first</label><div class="reviewTools"><input id="reviewSearch" class="input" placeholder="Search review content" oninput="renderContentReview()"><select id="reviewFilter" class="input" onchange="renderContentReview()"><option value="all">All content</option><option value="survival">Survival only</option><option value="needs">Needs review</option><option value="verified">Verified</option><option value="avoid">Avoid in field</option></select></div><div class="grid2" style="margin-top:10px"><button class="btn primary" onclick="renderContentReview()">Open content review</button><button class="btn" onclick="exportReviewCsv()">Export review CSV</button><button class="btn" onclick="exportReviewJson()">Export review JSON</button><button class="btn" onclick="copyReviewCsv()">Copy CSV</button></div><textarea id="reviewExportBox" class="input csvBox" placeholder="CSV preview appears here after export/copy."></textarea><div class="divider"></div><h3>Import reviewed JSON</h3><p class="muted">Paste a reviewed JSON export. This updates only phrase review metadata and suggested corrections, not SRS progress.</p><textarea id="reviewImportBox" class="input csvBox" placeholder='{"rows":[{"id":"p0","current_confidence":"Verified","review_notes":"Natural.","suggested_replacement":""}]}'></textarea><button class="btn warn" onclick="importReviewFile()">Import review metadata only</button><div id="contentReviewArea" style="margin-top:12px"></div></div>`}

function byId(id){return ITEMS.find(x=>x.id===id)}
function categories(){return [...new Set(ITEMS.map(x=>x.category))].sort()}
function survivalWeight(item){let idx=SURVIVAL_PRIORITY.findIndex(c=>(item.category||'').toLowerCase().includes(c.toLowerCase()));return idx<0?99:idx}
function isSurvival(item){return survivalWeight(item)<15}
function dayKeyFromTime(t){return t?iso(new Date(t)):''}
function dueItems(){let now=Date.now();return ITEMS.filter(it=>state.srs[it.id]&&state.srs[it.id].due<=now).sort((a,b)=>state.srs[a.id].due-state.srs[b.id].due)}
function recentMissPenalty(it){let h=(state.history||[]).slice(-60).reverse().find(x=>x.id===it.id);return h&&!h.ok?-80:0}
function deadlineScore(item){let d=daysUntilTrip(), score=0;if(d!==null&&d<=7&&isSurvival(item))score-=120;else if(d!==null&&d<=21&&isSurvival(item))score-=70;if(state.marks[item.id]==='review')score-=60;if(!fieldReady(item.id))score-=20;score+=survivalWeight(item)*3;score+=recentMissPenalty(item);return score}
function poolForToday(){let due=dueItems();let rest=ITEMS.filter(x=>!due.some(d=>d.id===x.id)&&!fieldReady(x.id)).sort((a,b)=>deadlineScore(a)-deadlineScore(b));return [...due,...rest].filter((v,i,a)=>a.findIndex(x=>x.id===v.id)===i)}
function getDailyIds(){let key=iso(today())+'|'+(state.tripDate||'')+'|'+dueItems().map(x=>x.id).slice(0,5).join(',');if(state.dailyKey!==key||!state.dailyIds?.length){state.dailyKey=key;state.dailyIds=poolForToday().slice(0,5).map(x=>x.id);save()}return state.dailyIds}
function compressedSrsDays(level){let days=SRS_LADDER[level];let trip=parseDate(state.tripDate);if(!trip)return days;let left=Math.max(1,Math.floor((trip-today())/86400000));if(left<=7)return Math.min(days,Math.max(1,Math.ceil(left/2)));if(left<=21)return Math.min(days,Math.max(2,Math.ceil(left/3)));return Math.min(days,left)}
function nextDueDate(id, ok, quality){let previous=state.srs[id]||null;let lvl=ok?Math.min(((previous&&previous.level)||0)+1,SRS_LADDER.length-1):0;let days=compressedSrsDays(lvl);let due=new Date();due.setDate(due.getDate()+days);let delayed=!!(ok&&previous&&previous.last&&dayKeyFromTime(previous.last)!==iso(today()));state.srs[id]={level:lvl,due:due.getTime(),last:Date.now(),quality:quality||0};state.seen[id]=state.seen[id]||Date.now();if(ok){state.recall[id]={ok:true,day:iso(today()),delayed:delayed||!!(state.recall[id]&&state.recall[id].delayed)};state.marks[id]=delayed?'field-ready':'remembered'}else{state.marks[id]='review'}state.history.push({t:Date.now(),id,ok,quality,delayed});save();}
function fieldReady(id){let r=state.recall[id];return !!(r&&r.ok&&r.delayed)}
function masteryLabel(id){if(fieldReady(id))return 'Field-ready';if(state.recall[id]?.ok||state.marks[id]==='remembered'||state.marks[id]==='mastered')return 'Remembered';if(state.understood[id])return 'Understood';if(state.seen[id]||state.srs[id])return 'Seen';return 'New'}
function reasonForToday(it){if(dueItems().some(x=>x.id===it.id))return 'Due now';if(state.marks[it.id]==='review')return 'Weak phrase';if((state.history||[]).slice(-30).some(x=>x.id===it.id&&!x.ok))return 'Recently missed';if(isSurvival(it))return daysUntilTrip()!==null&&daysUntilTrip()<=7?'Final-week survival':'Survival first';return 'New useful Greek'}

function dayDiffFromIso(x){if(!x)return null;let d=parseDate(x);if(!d)return null;return Math.floor((today()-d)/86400000)}
function streakStats(){let days=[...new Set((state.history||[]).filter(x=>x.ok).map(x=>dayKeyFromTime(x.t)))].sort();let streak=0;let cursor=today();for(;;){let k=iso(cursor);if(days.includes(k)){streak++;cursor.setDate(cursor.getDate()-1);continue}break}return {streak,last:days[days.length-1]||'',total:days.length}}
function nextDueSummary(){let arr=dueItems();if(arr.length)return arr.length+' due now';let future=ITEMS.map(x=>state.srs[x.id]).filter(Boolean).sort((a,b)=>a.due-b.due)[0];if(!future)return 'No reviews scheduled yet';let diff=Math.max(0,Math.ceil((future.due-Date.now())/86400000));return diff===0?'Later today':diff===1?'1 review day away':diff+' review days away'}
function reminderSupportText(){if(!('Notification' in window))return 'Notifications are not available in this browser.';if(Notification.permission==='granted')return 'Notifications allowed on this device.';if(Notification.permission==='denied')return 'Notifications are blocked in browser settings.';return 'Notifications not yet allowed.'}
