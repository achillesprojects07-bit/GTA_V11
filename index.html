function speakWithFeedback(id,rate){let it=byId(id);if(!it)return; if(!('speechSynthesis' in window)){alert('Audio is not available in this browser. Use the written phrase or show-card mode.');return}let label=rate&&rate<.7?'slow Greek':'Greek audio';toast('Playing '+label+'…');document.querySelectorAll('[data-audio-id="'+id+'"]').forEach(b=>b.classList.add('audioNow'));let u=new SpeechSynthesisUtterance(it.greek);u.lang='el-GR';u.rate=rate||.82;u.onend=u.onerror=()=>document.querySelectorAll('[data-audio-id="'+id+'"]').forEach(b=>b.classList.remove('audioNow'));speechSynthesis.cancel();setTimeout(()=>speechSynthesis.speak(u),40)}

function returnNudgeCard(){let st=streakStats();let last=dayDiffFromIso(state.nudges?.lastSessionDone);let doneToday=last===0;let line=doneToday?'Daily loop complete today. Come back tomorrow for delayed recall.':last===1?'You practiced yesterday. Today is your recall proof.':last===null?'Start once and GTA will track your return rhythm.':'It has been '+last+' days. Restart with only five phrases.';return `<div class="nudgePanel"><div class="sectionLabel">Return rhythm · V13.0</div><h2>${doneToday?'Protected for today':'Come back gently'}</h2><p class="muted tight">${line}</p><div class="streakLine"><span class="streakChip">🔥 ${st.streak}-day streak</span><span class="streakChip">📅 ${st.total} practice days</span><span class="streakChip">⏰ ${nextDueSummary()}</span></div></div>`}

function progressSnapshot(){let total=ITEMS.length;let seen=ITEMS.filter(x=>state.seen[x.id]).length;let understood=ITEMS.filter(x=>state.understood[x.id]).length;let remembered=ITEMS.filter(x=>masteryLabel(x.id)==='Remembered'||fieldReady(x.id)).length;let ready=ITEMS.filter(x=>fieldReady(x.id)).length;let due=dueItems().length;let review=ITEMS.filter(x=>state.marks[x.id]==='review').length;let survival=ITEMS.filter(x=>isSurvival(x));let survivalReady=survival.filter(x=>fieldReady(x.id)).length;let last=dayDiffFromIso(state.nudges?.lastSessionDone);let st=streakStats();return {total,seen,understood,remembered,ready,due,review,survival:survival.length,survivalReady,last,st}}
function pct(n,d){return Math.max(0,Math.min(100,Math.round((n/Math.max(1,d))*100)))}
function truthBar(label,n,d,help){let pc=pct(n,d);return `<div class="truthBar"><div class="barTop"><span>${esc(label)}</span><span>${n}/${d}</span></div><div class="progressbar"><span style="width:${pc}%"></span></div><small class="muted">${esc(help)}</small></div>`}
function progressTruthMini(){let x=progressSnapshot();return `<div class="card"><div class="sectionLabel">Progress truth · V12.7</div><h2>${x.ready} truly field-ready</h2><p class="muted tight">This separates exposure from real recall so you do not land in Greece overconfident.</p><div class="truthBars">${truthBar('Seen',x.seen,x.total,'You have opened or practiced the card.')}${truthBar('Understood by app',x.understood,x.total,'Speech recognition matched enough text; not pronunciation proof.')}${truthBar('Field-ready',x.ready,x.total,'Earned only after later recall.')}</div><button class="btn" style="margin-top:12px" onclick="nav('more');setTimeout(()=>document.getElementById('truthPanel')?.scrollIntoView({behavior:'smooth',block:'start'}),50)">Open full progress audit</button></div>`}
function reviewForecast(days=7){let now=today();let rows=[];for(let i=0;i<days;i++){let d=new Date(now);d.setDate(d.getDate()+i);let key=iso(d);let count=ITEMS.filter(it=>{let due=state.srs[it.id]?.due;return due&&iso(new Date(due))===key}).length;rows.push({key,count})}return rows}
function progressTruthPanel(){let x=progressSnapshot();let f=reviewForecast();let survivalPct=pct(x.survivalReady,x.survival);let lastLine=x.last===0?'Practiced today':x.last===1?'Practiced yesterday':x.last===null?'No completed daily loop yet':'Last daily loop: '+x.last+' days ago';return `<div class="card" id="truthPanel"><div class="sectionLabel">Progress truth</div><h2>Honest readiness dashboard</h2><p class="muted">GTA now shows what is actually ready, not just what looked correct once.</p><div class="truthGrid"><div class="truthStat"><b>${x.seen}</b><small>Seen cards</small></div><div class="truthStat"><b>${x.understood}</b><small>Understood by app</small></div><div class="truthStat"><b>${x.remembered}</b><small>Remembered</small></div><div class="truthStat"><b>${x.ready}</b><small>Field-ready</small></div></div><div class="truthBars">${truthBar('Survival field-ready',x.survivalReady,x.survival,'Taverna, taxi, pharmacy, lost, home, and shopping phrases.')}${truthBar('Whole library field-ready',x.ready,x.total,'Useful, but survival readiness matters more before the trip.')}</div><div class="auditList"><div class="auditItem">✅<span><b>${lastLine}</b><br>Return rhythm is based on finished sessions, not opening the app.</span></div><div class="auditItem">⏰<span><b>${x.due} due now</b><br>Due cards should be handled before browsing.</span></div><div class="auditItem">🔥<span><b>${x.st.streak}-day streak</b><br>${x.st.total} total practice days saved locally.</span></div></div><div class="miniSchedule">${f.map(r=>`<div class="rowItem"><b>${r.key.slice(5)}</b><span>${r.count} scheduled review${r.count===1?'':'s'}</span></div>`).join('')}</div></div>`}
function dataHealth(){let raw=localStorage.getItem(LS)||'';let kb=Math.round(raw.length/1024);let hasBackup=raw.length>100;let last=state.nudges?.lastSessionDone||'not yet';return {kb,hasBackup,last}}
function dataSafetyPanel(){let h=dataHealth();return `<div class="card"><div class="sectionLabel">Data safety</div><h2>Protect this phone’s progress.</h2><p class="muted">Progress is private and stored in this browser. Export before changing phones, clearing Safari data, or replacing the repository.</p><div class="safetyBox"><b>Local save health</b><br><span class="muted">Saved state size: ${h.kb} KB · Last completed loop: ${esc(h.last)}</span></div><div class="grid2" style="margin-top:10px"><button class="btn" onclick="exportBackup()">Show backup text</button><button class="btn primary" onclick="downloadBackup()">Download backup file</button></div><textarea class="input" id="backupBox" rows="6" placeholder="Backup appears here, or paste backup JSON to restore"></textarea><div class="grid2" style="margin-top:10px"><button class="btn" onclick="copyBackup()">Copy backup</button><button class="btn primary" onclick="restoreBackup()">Validate + restore</button></div></div><div class="card dangerZone"><div class="sectionLabel">Reset protection</div><h2>Reset only when intentional.</h2><p class="muted">This clears practice progress on this device, but keeps settings and trip date. Export first if unsure.</p><button class="btn warn" onclick="resetPracticeProgress()">Reset practice progress</button></div>`}
function validateBackup(obj){if(!obj||typeof obj!=='object')throw new Error('Backup is not an object.');['marks','srs','seen'].forEach(k=>{if(obj[k]&&typeof obj[k]!=='object')throw new Error('Backup field '+k+' is invalid.')});return true}
function isEmptyProgress(st){try{return ['srs','recall','seen','understood','marks'].every(k=>!Object.keys(st[k]||{}).length)&&!(st.saved||[]).length}catch(e){return false}}
const GTA_IDB_DB='gta-durable-state-v1',GTA_IDB_STORE='snapshots';let gtaLastAutoBackup=0;
function gtaStoragePersist(){try{if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(()=>{})}catch(e){}}
function gtaIdb(){return new Promise((resolve,reject)=>{try{if(!('indexedDB' in window)){reject(new Error('IndexedDB unavailable'));return}let req=indexedDB.open(GTA_IDB_DB,1);req.onupgradeneeded=()=>{try{req.result.createObjectStore(GTA_IDB_STORE)}catch(e){}};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error||new Error('IndexedDB open failed'))}catch(e){reject(e)}})}
function gtaIdbTx(mode,fn){return gtaIdb().then(db=>new Promise((resolve,reject)=>{try{let tx=db.transaction(GTA_IDB_STORE,mode),store=tx.objectStore(GTA_IDB_STORE);fn(store,resolve,reject);tx.oncomplete=()=>{try{db.close()}catch(e){}};tx.onerror=()=>{try{db.close()}catch(e){};reject(tx.error)}}catch(e){try{db.close()}catch(_e){};reject(e)}}))}
function gtaIdbPut(key,val){return gtaIdbTx('readwrite',(store,resolve)=>{store.put(val,key);resolve(true)}).catch(()=>{})}
function gtaIdbGet(key){return gtaIdbTx('readonly',(store,resolve,reject)=>{let r=store.get(key);r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)}).catch(()=>null)}
function gtaPruneDailyBackups(){try{return gtaIdbTx('readwrite',(store,resolve,reject)=>{let keysReq=store.getAllKeys();keysReq.onsuccess=()=>{try{(keysReq.result||[]).filter(k=>String(k).startsWith('daily:')).sort().slice(0,-7).forEach(k=>store.delete(k));resolve(true)}catch(e){reject(e)}};keysReq.onerror=()=>reject(keysReq.error)})}catch(e){return Promise.resolve()}}
function gtaDurableSnapshot(force){try{let now=Date.now();if(!force&&now-gtaLastAutoBackup<60000)return;gtaLastAutoBackup=now;let day=new Date(now).toISOString().slice(0,10);let snap={savedAt:now,state:JSON.parse(JSON.stringify(state))};gtaIdbPut('latest',snap);gtaIdbPut('daily:'+day,snap).then(()=>gtaPruneDailyBackups())}catch(e){}}
window.__gtaAutoBackup=function(){gtaDurableSnapshot(false)};
function gtaFlushDurableBackup(){try{gtaDurableSnapshot(true)}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')gtaFlushDurableBackup()});
window.addEventListener('pagehide',gtaFlushDurableBackup);
async function gtaRecoverIfEmpty(){try{if(!isEmptyProgress(state))return;let snap=await gtaIdbGet('latest');let recovered=snap&&snap.state?snap.state:null;if(!recovered)return;validateBackup(recovered);if(!isEmptyProgress(state))return;state=Object.assign(loadState(),recovered);save();renderCountdown();renderHome();toast('Progress recovered — please export a backup.')}catch(e){}}
function downloadBackup(){let txt=JSON.stringify(state,null,2);let blob=new Blob([txt],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);state.lastBackup=iso(today());save();a.download='gta-v13-0-backup-'+iso(today())+'.json';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},1000);toast('Backup file created.')}
async function copyBackup(){let txt=JSON.stringify(state,null,2);let box=$('backupBox');if(box)box.value=txt;try{await navigator.clipboard.writeText(txt);toast('Backup copied.')}catch(e){toast('Backup shown. Copy manually.')}}
function resetPracticeProgress(){if(!confirm('Export a backup first. Reset practice progress on this device?'))return;let keep={tripDate:state.tripDate,onboarded:state.onboarded,settings:state.settings,nudges:state.nudges};state=Object.assign(loadState(),keep,{marks:{},srs:{},understood:{},recall:{},seen:{},saved:[],history:[],sessionCount:0,recordings:{}});save();toast('Practice progress reset.');renderHome();}

function renderHome(){if(!state.onboarded){renderOnboarding();return}let due=dueItems(), daily=getDailyIds().map(byId).filter(Boolean), ready=ITEMS.filter(x=>fieldReady(x.id)).length, review=ITEMS.filter(x=>state.marks[x.id]==='review').length, remembered=ITEMS.filter(x=>masteryLabel(x.id)==='Remembered').length;let d=daysUntilTrip();let pct=Math.min(100,Math.round((ready/Math.max(1,ITEMS.length))*100));$('home').innerHTML=`<div class="hero"><div class="sectionLabel">Today’s loop</div><h1>Five useful phrases. Then only what is due.</h1><p class="muted">This is the whole app on purpose. Finish today’s loop before exploring anything else.</p><div class="grid2"><button class="btn primary" onclick="startDaily()">Start Today’s 5</button><button class="btn" onclick="startDue()">Due Now (${due.length})</button></div></div>
<div class="card"><div class="row"><div><div class="sectionLabel">Trip focus</div><h2>${d===null?'Set your Greece date':d>7?d+' days until Greece':d>=0?'Final week survival mode':'Trip date passed'}</h2><p class="muted">Reviews compress toward the trip date. In the final week, survival phrases come first automatically.</p></div></div><div class="grid2"><input class="input" id="tripInput" type="date" value="${esc(state.tripDate||'')}"><button class="btn primary" onclick="state.tripDate=$('tripInput').value;state.dailyIds=[];save();renderHome()">Save trip date</button></div></div>
<div class="grid3"><div class="stat"><b>${due.length}</b>Due now</div><div class="stat"><b>${remembered}</b>Remembered</div><div class="stat"><b>${ready}</b>Field-ready</div></div>${phoneUxMini()}${progressTruthMini()}${returnNudgeCard()}
<div class="card"><div class="sectionLabel">Honest progress</div><div class="progressbar"><span style="width:${pct}%"></span></div><p class="muted tight">${pct}% of the library is field-ready. Green is earned only by delayed recall.</p></div>
<div class="card"><div class="sectionLabel">Today’s 5 preview</div>${daily.map(cardMini).join('')||'<div class="empty">No daily cards yet.</div>'}<button class="btn primary" onclick="startDaily()">Begin Today’s 5</button></div>
<div class="notice warn"><b>Honest mastery:</b> speech match only means “the app understood you.” A phrase becomes field-ready only after you recall it in a later session.</div>`;renderCountdown()}
function cardMini(it){return `<div class="tight"><b>${esc(it.english)}</b><br><span class="muted">${esc(it.category)} · ${masteryLabel(it.id)}</span><br><span class="whyTag">${reasonForToday(it)}</span></div>`}
function renderPractice(){let due=dueItems().length;$('practice').innerHTML=`<div class="card"><div class="sectionLabel">Practice depth</div><h2>One practice room, four depths.</h2><p class="muted">This replaces the old spread of speaking destinations. Choose the depth, not a new mode.</p><div class="tabs">${['recognize','recall','speak','converse'].map(m=>`<button class="tab ${currentMode===m?'active':''}" onclick="currentMode='${m}';renderPractice()">${labelMode(m)}</button>`).join('')}</div></div><div id="practiceArea"></div><div class="card"><button class="btn" onclick="renderCategoryBrowser()">More ways to practice by category</button><button class="btn" onclick="startDue()">Due Now (${due})</button></div>`;renderModeStart()}
function labelMode(m){return ({recognize:'Recognize',recall:'Recall',speak:'Speak',converse:'Converse'})[m]}
function renderModeStart(){let pool=currentMode==='recall'?poolForToday().filter(x=>state.marks[x.id]!=='mastered').slice(0,20):poolForToday().slice(0,20);$('practiceArea').innerHTML=`<div class="card"><h2>${labelMode(currentMode)}</h2><p class="muted">${modeHelp(currentMode)}</p><button class="btn primary" onclick="startPool('${currentMode}')">Start ${labelMode(currentMode)}</button></div>`}
function modeHelp(m){return {recognize:'See English and choose/recognize the Greek. Best for first exposure.',recall:'Try to remember the Greek before revealing it. This is the delayed mastery check.',speak:'Say the phrase out loud. If speech recognition works, it checks whether the app understood you.',converse:'Use one phrase as your line in a real-life mini situation.'}[m]}
function startDaily(){startSession(getDailyIds().map(byId).filter(Boolean),'daily')}
function startDue(){let arr=dueItems();if(!arr.length){toast('Nothing is due now. Today’s 5 will keep you moving.');nav('home');return}startSession(arr,'due')}
function startPool(mode){currentMode=mode;startSession(poolForToday().slice(0,10),mode)}
function startSession(items,type){window.session={items,index:0,type,ok:0,miss:0,delayed:0,started:Date.now()};state.sessionCount=(state.sessionCount||0)+1;save();nav(type==='daily'||type==='due'?'home':'practice');renderSessionCard()}
function renderSessionDone(){markSessionDone();let s=window.session||{items:[],ok:0,miss:0,delayed:0,type:'daily'};let done=s.items.length;let msg=s.type==='daily'?'Today’s Greek is done.':'Review loop complete.';let host=$('home').classList.contains('active')?'home':'practiceArea';$(host).innerHTML=`<div class="completion"><div class="sectionLabel">Session complete</div><h1>${msg}</h1><p class="muted">You practiced ${done} ${done===1?'phrase':'phrases'}. ${s.ok} moved forward. ${s.delayed} ${s.delayed===1?'is':'are'} now field-ready after delayed recall.</p><div class="grid2"><button class="btn" onclick="nav('survival')">Open I’m here</button><button class="btn primary" onclick="renderHome()">Back to Today</button></div></div><div class="card"><h2>What happens next?</h2><p class="muted">Come back tomorrow to prove recall. A phrase is not truly field-ready until you can bring it back after time has passed.</p></div>`}
function renderSessionCard(){let s=window.session;if(!s||s.index>=s.items.length){renderSessionDone();return}let it=s.items[s.index], mode=s.type==='daily'?'recall':(s.type==='due'?'recall':currentMode);currentCard=it;state.seen[it.id]=state.seen[it.id]||Date.now();save();let body=renderCard(it,mode,s.index+1,s.items.length);let host=$('home').classList.contains('active')?'home':'practiceArea';$(host).innerHTML=body}
function renderCard(it,mode,n,total){let hidden=mode==='recall'?'hiddenAnswer':'';let converse=mode==='converse'?`<div class="notice"><b>Situation:</b> You are in Greece. A person is waiting. Say your line naturally, then tap the audio and compare.</div>`:'';let label=masteryLabel(it.id);return `<div class="card"><div class="row"><span class="pill">${n}/${total}</span><span class="pill">${esc(it.category)}</span><span class="pill">${label}</span></div><div class="divider"></div><div class="english">${esc(it.english)}</div>${converse}<div class="phrase ${hidden}" id="greekAnswer">${gr(it.greek)}</div><div class="pron ${hidden}" id="pronAnswer">${esc(it.pron||'')}</div>${scriptPanel(it)}${it.casual&&it.formal&&it.casual!==it.formal?`<div class="notice"><b>Casual:</b> ${gr(it.casual)}<br><b>Formal:</b> ${gr(it.formal)}</div>`:''}${it.note?`<p class="note">${esc(it.note)}</p>`:''}<div class="masteryGrid"><div class="mastery on">Seen</div><div class="mastery ${state.understood[it.id]?'on':''}">Understood</div><div class="mastery ${(state.recall[it.id]?.ok||state.marks[it.id]==='remembered'||state.marks[it.id]==='mastered')?'on':''}">Remembered</div><div class="mastery ${fieldReady(it.id)?'on':''}">Field-ready</div></div><div class="statusLine"><span class="check"><span class="dot ${state.understood[it.id]?'ok':'blue'}"></span>${state.understood[it.id]?'The app understood you':'Not speech-checked yet'}</span><span class="check"><span class="dot ${fieldReady(it.id)?'ok':'warn'}"></span>${fieldReady(it.id)?'Field-ready after delayed recall':'Needs delayed recall before field-ready'}</span></div><div class="grid2" style="margin-top:14px"><button class="btn" data-audio-id="${it.id}" aria-label="Play Greek audio" onclick="speak('${it.id}')">🔊 Hear Greek</button><button class="btn" onclick="reveal()">Reveal</button></div>${state.settings.recordCompare?recordComparePanel(it):''}${mode==='speak'?`<button class="btn primary" aria-label="Check if the app understands my spoken Greek" onclick="listenForSpeech('${it.id}')">🎙 Check if app understands me</button>`:''}<div class="stickyActions"><div class="tapHint">Final step for this card</div><div class="grid2" style="margin-top:8px"><button class="btn warn" onclick="grade(false)">Need practice</button><button class="btn good" onclick="grade(true)">I recalled it</button></div></div></div>`}

function scriptPanel(it){if(!state.settings.scriptTrack)return '';let tips=scriptTips(it.greek);return `<div class="scriptPanel"><div class="sectionLabel">Greek script track · optional</div><div class="scriptLine">${gr(it.greek)}</div><div class="recordHint">Use this only when you want literacy support. Spoken survival Greek still comes first.</div><div class="letterChips">${tips.map(x=>`<span class="letterChip">${esc(x)}</span>`).join('')}</div></div>`}
function scriptTips(txt){let map={'α':'a','ά':'a','β':'v','γ':'gh/y','δ':'th','ε':'e','έ':'e','ζ':'z','η':'ee','ή':'ee','θ':'th','ι':'ee','ί':'ee','ϊ':'ee','κ':'k','λ':'l','μ':'m','ν':'n','ξ':'x','ο':'o','ό':'o','π':'p','ρ':'r','σ':'s','ς':'s','τ':'t','υ':'ee','ύ':'ee','φ':'f','χ':'h/kh','ψ':'ps','ω':'o','ώ':'o'};let seen=[];String(txt||'').toLowerCase().split('').forEach(ch=>{if(map[ch]&&!seen.includes(ch))seen.push(ch)});return seen.slice(0,10).map(ch=>ch+' = '+map[ch])}
function recordComparePanel(it){let has=!!recordingUrls[it.id];return `<div class="recordPanel" id="recordPanel_${it.id}"><div class="sectionLabel">Hear your progress</div><p class="muted tight">Listen to native audio, record yourself, then play both back-to-back. This is comparison, not a score.</p><div class="compareGrid"><button class="btn" data-audio-id="${it.id}" aria-label="Play native Greek audio" onclick="speak('${it.id}')">1 Native</button><button class="btn primary" aria-label="Record or stop my Greek voice" onclick="toggleRecording('${it.id}')" id="recordBtn_${it.id}">${mediaRecorder&&mediaRecorder.state==='recording'?'Stop':'2 Record'}</button><button class="btn" aria-label="Play my Greek recording" onclick="playMyRecording('${it.id}')" ${has?'':'disabled'}>3 Mine</button></div><div class="selfCheck"><label><input type="checkbox"> Stress feels close</label><label><input type="checkbox"> Speed feels close</label><label><input type="checkbox"> I can say it without panic</label></div><div class="recordHint" id="recordHint_${it.id}">${has?'Recording ready for this session.':'Recordings stay on this device for the current app session.'}</div></div>`}
async function toggleRecording(id){if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();return}try{let stream=await navigator.mediaDevices.getUserMedia({audio:true});recordingChunks=[];mediaRecorder=new MediaRecorder(stream);mediaRecorder.ondataavailable=e=>{if(e.data&&e.data.size)recordingChunks.push(e.data)};mediaRecorder.onstop=()=>{let blob=new Blob(recordingChunks,{type:'audio/webm'});if(recordingUrls[id])URL.revokeObjectURL(recordingUrls[id]);recordingUrls[id]=URL.createObjectURL(blob);state.recordings[id]={t:Date.now(),sessionOnly:true};save();stream.getTracks().forEach(t=>t.stop());toast('Recording saved for comparison.');renderSessionCard()};mediaRecorder.start();let p=$('recordPanel_'+id);if(p)p.classList.add('recording');let h=$('recordHint_'+id);if(h)h.textContent='Recording… tap Stop when done.';let b=$('recordBtn_'+id);if(b)b.textContent='Stop';}catch(e){alert('Microphone access is not available. You can still use native audio and self-check.')}}
function playMyRecording(id){let url=recordingUrls[id];if(!url){toast('No recording yet.');return}let a=new Audio(url);a.play().catch(()=>alert('Could not play this recording.'))}
function toggleSetting(name,checked){state.settings=state.settings||{};state.settings[name]=!!checked;save();if($('more')&&$('more').classList.contains('active'))renderMore();}

function reveal(){$('greekAnswer')?.classList.remove('hiddenAnswer');$('pronAnswer')?.classList.remove('hiddenAnswer')}
function grade(ok){let it=currentCard;if(!it)return;let before=!!fieldReady(it.id);nextDueDate(it.id,ok,ok?3:1);let after=!!fieldReady(it.id);if(window.session){if(ok)window.session.ok++;else window.session.miss++;if(!before&&after)window.session.delayed++}window.session.index++;renderSessionCard()}
function speak(id){speakWithFeedback(id,.82)}
function listenForSpeech(id){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Speech recognition is not available in this browser. You can still self-mark after speaking.');return}let rec=new SR();rec.lang='el-GR';rec.interimResults=false;rec.maxAlternatives=1;rec.onresult=e=>{state.understood[id]={t:Date.now(),text:e.results[0][0].transcript};save();alert('The app heard: '+e.results[0][0].transcript+'\nThis is not pronunciation mastery yet.');renderSessionCard()};rec.onerror=()=>alert('Could not hear clearly. Try again or self-mark.');rec.start()}
function setSurvival(k){currentSurvival=k;survivalQuery='';renderSurvival()}
function getSurvivalMeta(){return SURVIVAL_CATS[currentSurvival]||SURVIVAL_CATS.Taverna}
function survivalPool(){let meta=getSurvivalMeta();let q=(survivalQuery||'').trim().toLowerCase();let arr=ITEMS.filter(x=>meta.terms.some(t=>(x.category+' '+x.english).toLowerCase().includes(t.toLowerCase())));if(q)arr=arr.filter(x=>(x.english+' '+x.greek+' '+(x.pron||'')+' '+x.category+' '+reviewFor(x.id).confidence).toLowerCase().includes(q));return arr.sort((a,b)=>{let av=isVerified(a.id)?-100:(reviewFor(a.id).confidence==='Avoid in field'?100:0);let bv=isVerified(b.id)?-100:(reviewFor(b.id).confidence==='Avoid in field'?100:0);if(state.reviewSafeOnly){av+=isFieldSafe(a.id)?0:40;bv+=isFieldSafe(b.id)?0:40}return (av+survivalWeight(a))-(bv+survivalWeight(b))||a.english.localeCompare(b.english)}).slice(0,30)}
function survivalUrgentItems(){let wants=['help','understand','english','again','slowly','lost','pharmacy','bathroom'];let out=[];wants.forEach(w=>{let hit=ITEMS.find(x=>(x.english||'').toLowerCase().includes(w)&&!out.some(y=>y.id===x.id));if(hit)out.push(hit)});return out.slice(0,6)}
function toast(msg){let old=document.getElementById('toastMsg');if(old)old.remove();let t=document.createElement('div');t.id='toastMsg';t.textContent=msg;t.style.cssText='position:fixed;left:16px;right:16px;bottom:88px;z-index:99;background:var(--ink);color:var(--surface);border-radius:16px;padding:12px 14px;text-align:center;font-weight:850;box-shadow:var(--shadow)';document.body.appendChild(t);setTimeout(()=>t.remove(),1800)}
function speakSlow(id){speakWithFeedback(id,.58)}
function copyGreek(id){let it=byId(id);if(!it)return;if(navigator.clipboard){navigator.clipboard.writeText(it.greek).then(()=>toast('Copied Greek phrase.')).catch(()=>alert(it.greek));}else{alert(it.greek)}}
function saveSurvival(id){state.saved=state.saved||[];if(!state.saved.includes(id))state.saved.unshift(id);state.saved=state.saved.slice(0,30);state.seen[id]=state.seen[id]||Date.now();save();toast('Saved for practice later.')}
function showSurvival(id){let it=byId(id);if(!it)return;$('survival').innerHTML=`<div class="showCard"><div class="english">Show this to someone</div><div class="phrase">${gr(it.greek)}</div><div class="pron">${esc(it.pron||'')}</div><p>${esc(it.english)}</p><button class="btn primary" data-audio-id="${it.id}" aria-label="Play Greek audio" onclick="speak('${it.id}')">🔊 Play audio</button><button class="btn" onclick="renderSurvival()">Back</button></div>`}
function renderSurvival(){let meta=getSurvivalMeta();let arr=survivalPool();let tabs=Object.keys(SURVIVAL_CATS).map(k=>`<button class="tab ${currentSurvival===k?'active':''}" aria-label="Open ${k} survival phrases" onclick="setSurvival('${k}')">${SURVIVAL_CATS[k].icon} ${k}</button>`).join('');let urgent=survivalUrgentItems().map(it=>`<button class="panicBtn" data-audio-id="${it.id}" aria-label="Play urgent phrase: ${esc(it.english)}" onclick="speak('${it.id}')">${esc(it.english)}</button>`).join('');$('survival').innerHTML=`<div class="hero survivalHero"><div class="sectionLabel">I’m here now · V13.0 field-safe</div><h1>${meta.icon} ${currentSurvival}</h1><p class="muted">${esc(meta.hint)} No quiz here. Tap once for audio, slow audio, or a show-card.</p></div>
<div class="survivalDock"><div class="tabs">${tabs}</div><div class="survivalSearch"><input class="input" id="survivalSearch" placeholder="Search this situation" value="${esc(survivalQuery)}" oninput="survivalQuery=this.value;renderSurvival()"><button class="btn" onclick="survivalQuery='';renderSurvival()">Clear</button></div><div class="panicStrip">${urgent}</div></div>
<div class="card scenarioHeader"><div class="sectionLabel">Tap first</div><div class="bigHint">${meta.first.map(x=>`<span class="survivalTag">${esc(x)}</span>`).join(' ')}</div><p class="muted tight">Use the formal version by default with strangers. Casual is still kept inside the card when available.</p></div>
<div class="list">${arr.map(survivalCard).join('')||'<div class="emptySurvival">No phrases found in this situation. Try another tab or clear search.</div>'}</div>`}
function survivalCard(it){let casual=it.casual&&it.casual!==it.formal?`<div class="microCue"><span>Casual:</span><b>${gr(it.casual)}</b></div>`:'';let r=reviewFor(it.id);let safe=r.confidence==='Verified'?'field-safe verified':r.confidence==='Avoid in field'?'avoid in field until reviewed':'needs native review';return `<div class="card survivalCard"><div class="survivalCardTop"><div class="sectionLabel">${esc(it.category)} · ${masteryLabel(it.id)}</div><div class="reviewMeta"><span class="reviewBadge ${confidenceClass(r.confidence)}">${esc(r.confidence)}</span><span class="reviewBadge">${esc(safe)}</span></div><div class="english">${esc(it.english)}</div><div class="phrase">${gr(it.greek)}</div><div class="pron">${esc(it.pron||'')}</div>${scriptPanel(it)}${casual}<div class="microCue"><span>Signal:</span><b>${esc(safe)}</b></div></div><div class="survivalCardActions"><button class="btn primary" data-audio-id="${it.id}" aria-label="Play normal Greek audio" onclick="speak('${it.id}')">🔊 Normal</button><button class="btn" data-audio-id="${it.id}" aria-label="Play slow Greek audio" onclick="speakSlow('${it.id}')">🐢 Slow</button><button class="btn" aria-label="Show this Greek phrase card" onclick="showSurvival('${it.id}')">👀 Show card</button><button class="btn" aria-label="Save this phrase for practice later" onclick="saveSurvival('${it.id}')">＋ Practice later</button></div></div>`}

function releaseEmptyStatesPanel(){let due=dueItems().length;let reviewed=Object.keys(state.review||{}).filter(id=>reviewFor(id).confidence==='Verified').length;return `<div class="card"><div class="sectionLabel">Release-quality empty states</div><h2>Clear even when nothing is ready yet.</h2><div class="emptyState"><b>${due?due+' cards are due now':'Nothing is due right now.'}</b><br>${due?'Open Due Now from Practice to protect recall.':'Today’s 5 will keep you moving.'}</div><div class="emptyState"><b>${state.tripDate?'Trip date set: '+esc(state.tripDate):'No trip date yet.'}</b><br>${state.tripDate?'The scheduler can now compress reviews toward Greece.':'Set your Greece date so the app can pace your practice.'}</div><div class="emptyState"><b>${reviewed?reviewed+' native-verified phrase records':'No native-reviewed phrases yet.'}</b><br>${reviewed?'Verified phrases are promoted first in I’m Here.':'Export the review file and ask a Greek speaker to check it.'}</div></div>`}
function stableLaunchPanel(){let steps=['Upload only the V13.0 folder files to the new repository','Enable GitHub Pages from the repository root','Open the Pages URL on iPhone Safari','Add to Home Screen after the first online load','Open Today, Practice, I’m Here, Progress, and More','Play normal and slow Greek audio once','Export a backup file','Turn airplane mode on and reopen the installed app'];return `<div class="card"><div class="sectionLabel">Stable launch checklist</div><h2>Ready for the new repository.</h2><p class="muted">V13.0 freezes the redesigned core. Do not add new learning systems until this checklist passes on the real phone.</p><div class="stepList">${steps.map(x=>`<div class="stepItem"><div class="stepIcon">✓</div><div><b>${esc(x)}</b><br><span class="muted">Launch-readiness check for the public stable build.</span></div></div>`).join('')}</div></div>`}
function buildIntegrityPanel(){let raw=localStorage.getItem(LS)||'';let sw=('serviceWorker' in navigator)?'Supported':'Unavailable';let storage=raw.length?Math.round(raw.length/1024)+' KB saved':'No saved practice state yet';let backup=state.lastBackup||'not yet';let checks=['Today view renders','Practice view renders','I’m Here view renders','Progress view renders','Settings view renders','Offline files declared','Content counts present','Backup tools present'];return `<div class="card"><div class="sectionLabel">Build integrity</div><h2>V13.0 stable integrity panel</h2><div class="integrityGrid"><div class="integrityItem"><b>V13.0</b><span class="muted">Version label</span></div><div class="integrityItem"><b>${DATA.phrases.length}</b><span class="muted">Phrase records</span></div><div class="integrityItem"><b>${DATA.vocab.length}</b><span class="muted">Vocabulary records</span></div><div class="integrityItem"><b>${ITEMS.length}</b><span class="muted">Total cards</span></div><div class="integrityItem"><b>${storage}</b><span class="muted">Storage status</span></div><div class="integrityItem"><b>${sw}</b><span class="muted">Service worker status</span></div><div class="integrityItem"><b>${esc(backup)}</b><span class="muted">Last backup date</span></div><div class="integrityItem"><b>${location.protocol==='https:'||location.hostname==='localhost'?'Launch-safe':'Needs HTTPS'}</b><span class="muted">PWA context</span></div></div><div class="divider"></div><div class="stepList">${checks.map(x=>`<div class="stepItem"><div class="stepIcon">✓</div><div><b>${esc(x)}</b><br><span class="muted">Included in the V13.0 public stable release.</span></div></div>`).join('')}</div></div>`}
function renderProgress(){let x=progressSnapshot();let due=dueItems();$('progress').innerHTML=`<div class="hero"><div class="sectionLabel">Progress · stable release</div><h1>Trust progress, not vanity numbers.</h1><p class="muted">This screen separates exposure from true field readiness so you do not land in Greece overconfident.</p><div class="grid2"><button class="btn primary" onclick="startDaily()">Practice Today’s 5</button><button class="btn" onclick="nav('more')">Open Settings</button></div></div>${progressTruthPanel()}${releaseEmptyStatesPanel()}${stableLaunchPanel()}${buildIntegrityPanel()}<div class="card"><div class="sectionLabel">Next action</div><h2>${due.length?'Handle Due Now':'No reviews due now'}</h2><p class="muted">${due.length?'You have '+due.length+' due cards. Do these before browsing.':'Nothing is due right now. Today’s 5 will keep your trip practice moving.'}</p><div class="grid2"><button class="btn primary" onclick="startDaily()">Today’s 5</button><button class="btn" onclick="startDue()">Due Now (${due.length})</button></div></div>`;renderCountdown()}
function reminderSettingsPanel(){return `<div class="settingsGroup"><div class="sectionLabel">Reminder rhythm</div><h3>Gentle nudges</h3><p class="muted">Use reminders only to return to Today’s 5. iPhone PWA notification support depends on iOS/browser settings.</p><div class="nudgeStatus"><span class="dot ${state.settings.remindersEnabled?'ok':'warn'}"></span><span><b>${state.settings.remindersEnabled?'Reminders on':'Reminders off'}</b> · ${reminderSupportText()}</span></div><div class="grid2" style="margin-top:10px"><input id="reminderTime" class="input" type="time" value="${esc(state.settings.reminderTime||'09:00')}"><button class="btn" onclick="saveReminderTime()">Save time</button></div><div class="grid2" style="margin-top:10px">${state.settings.remindersEnabled?'<button class="btn warn" onclick="disableReminders()">Turn reminders off</button>':'<button class="btn primary" onclick="enableReminders()">Enable reminder</button>'}<button class="btn" onclick="installApp()">Install / Add to Home</button></div></div>`}
function depthSettingsPanel(){return `<div class="settingsGroup"><div class="sectionLabel">Practice depth</div><h3>Optional support</h3><label class="toggleRow"><span><b>Hear-your-progress comparison</b><br><span class="muted">Record yourself and compare with native audio.</span></span><input type="checkbox" ${state.settings.recordCompare?'checked':''} onchange="toggleSetting('recordCompare',this.checked)"></label><label class="toggleRow"><span><b>Optional Greek-script track</b><br><span class="muted">Show Greek letters and quick sound hints below cards.</span></span><input type="checkbox" ${state.settings.scriptTrack?'checked':''} onchange="toggleSetting('scriptTrack',this.checked)"></label></div>`}
function tripSettingsPanel(){let d=daysUntilTrip();return `<div class="settingsGroup"><div class="sectionLabel">Trip date</div><h3>${d===null?'Set your Greece date':d>=0?d+' days until Greece':'Trip date passed'}</h3><p class="muted">This keeps the deadline-aware scheduler honest.</p><div class="grid2"><input class="input" id="settingsTripInput" type="date" value="${esc(state.tripDate||'')}"><button class="btn primary" onclick="state.tripDate=$('settingsTripInput').value;state.dailyIds=[];save();renderMore();renderCountdown()">Save trip date</button></div></div>`}
function renderMore(){ensureReviewState();$('more').innerHTML=`<div class="hero"><div class="sectionLabel">More · settings</div><h1>One clean control room.</h1><p class="muted">Trip date, practice depth, reminders, backup, reset, content review, and build integrity now live here.</p><span class="rcBadge">Public stable release</span></div>${stableLaunchPanel()}${tripSettingsPanel()}${depthSettingsPanel()}${reminderSettingsPanel()}${dataSafetyPanel()}${contentReviewPanel()}${buildIntegrityPanel()}<div class="card"><div class="sectionLabel">Search</div><h2>Find any phrase</h2><input id="searchInput" class="input" placeholder="Search English, Greek, category..." oninput="searchAll(this.value)"><div id="searchResults" class="list"></div></div><div class="card"><div class="sectionLabel">Content library</div><h2>Browse categories</h2><p class="muted">${ITEMS.length} total cards · ${DATA.phrases.length} phrases · ${DATA.vocab.length} vocabulary items.</p><button class="btn" onclick="renderCategoryBrowser()">Browse categories</button><div id="categoryBrowser"></div></div><div class="footerNote">${APP_VERSION} · public stable release · offline-first single-file PWA</div>`;renderCountdown()}
function renderCategoryBrowser(){if(!$('more').classList.contains('active'))nav('more');let el=$('categoryBrowser');if(!el)return;el.innerHTML='<div class="chips">'+categories().map(c=>`<button class="chip" onclick="showCategory('${esc(c).replace(/'/g,'&#39;')}')">${esc(c)}</button>`).join('')+'</div><div id="catResults"></div>'}
function showCategory(c){let arr=ITEMS.filter(x=>x.category===c).slice(0,80);$('catResults').innerHTML='<h3>'+esc(c)+'</h3>'+arr.map(survivalCard).join('')}
function exportBackup(){let b=$('backupBox');if(b)b.value=JSON.stringify(state,null,2);toast('Backup text shown.')}
function restoreBackup(){try{let obj=JSON.parse($('backupBox').value);validateBackup(obj);state=Object.assign(loadState(),obj);save();alert('Backup restored.');renderMore()}catch(e){alert('Could not restore backup: '+(e.message||'invalid JSON'))}}
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}
gtaStoragePersist();gtaRecoverIfEmpty();
window.addEventListener('beforeinstallprompt',e=>{deferredPrompt=e});window.addEventListener('touchstart',primeVoices,{once:true,passive:true});if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=primeVoices;primeVoices();}
renderCountdown();scheduleLocalNudge();renderHome();
</script>
</body></html>
